name: OpenClaw Scheduled Live And E2E Checks

on:
  schedule:
    # Run at 11:30 Asia/Shanghai every day.
    - cron: "30 11 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:
    inputs:
      include_repo_e2e:
        description: Whether to run pnpm test:e2e plus repo-specific extra E2E lanes
        required: false
        default: true
        type: boolean
      include_openwebui:
        description: Whether to run the Open WebUI Docker smoke
        required: false
        default: true
        type: boolean
      include_live_suites:
        description: Whether to run live-provider coverage
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: openclaw-scheduled-live-checks-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  resolve_target:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      ref: ${{ steps.ref.outputs.ref }}
      include_repo_e2e: ${{ steps.inputs.outputs.include_repo_e2e }}
      include_openwebui: ${{ steps.inputs.outputs.include_openwebui }}
      include_live_suites: ${{ steps.inputs.outputs.include_live_suites }}
    steps:
      - name: Require main workflow ref
        env:
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ "${WORKFLOW_REF}" != "refs/heads/main" ]]; then
            echo "Scheduled live checks must run from main so the workflow definition and secrets stay canonical." >&2
            exit 1
          fi

      - name: Capture selected ref
        id: ref
        env:
          WORKFLOW_SHA: ${{ github.sha }}
        run: printf 'ref=%s\n' "${WORKFLOW_SHA}" >> "$GITHUB_OUTPUT"

      - name: Capture lane selection
        id: inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_INCLUDE_REPO_E2E: ${{ inputs.include_repo_e2e }}
          INPUT_INCLUDE_OPENWEBUI: ${{ inputs.include_openwebui }}
          INPUT_INCLUDE_LIVE_SUITES: ${{ inputs.include_live_suites }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            include_repo_e2e="${INPUT_INCLUDE_REPO_E2E}"
            include_openwebui="${INPUT_INCLUDE_OPENWEBUI}"
            include_live_suites="${INPUT_INCLUDE_LIVE_SUITES}"
          else
            include_repo_e2e="true"
            include_openwebui="true"
            include_live_suites="true"
          fi

          {
            printf 'include_repo_e2e=%s\n' "${include_repo_e2e}"
            printf 'include_openwebui=%s\n' "${include_openwebui}"
            printf 'include_live_suites=%s\n' "${include_live_suites}"
          } >> "$GITHUB_OUTPUT"

  live_and_openwebui_checks:
    needs: [resolve_target]
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/openclaw-live-and-e2e-checks-reusable.yml
    with:
      ref: ${{ needs.resolve_target.outputs.ref }}
      include_repo_e2e: ${{ needs.resolve_target.outputs.include_repo_e2e == 'true' }}
      include_release_path_suites: false
      include_openwebui: ${{ needs.resolve_target.outputs.include_openwebui == 'true' }}
      include_live_suites: ${{ needs.resolve_target.outputs.include_live_suites == 'true' }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_API_KEY_OLD: ${{ secrets.ANTHROPIC_API_KEY_OLD }}
      ANTHROPIC_API_TOKEN: ${{ secrets.ANTHROPIC_API_TOKEN }}
      BYTEPLUS_API_KEY: ${{ secrets.BYTEPLUS_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      MODELSTUDIO_API_KEY: ${{ secrets.MODELSTUDIO_API_KEY }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
      OPENCLAW_LIVE_BROWSER_CDP_URL: ${{ secrets.OPENCLAW_LIVE_BROWSER_CDP_URL }}
      OPENCLAW_LIVE_SETUP_TOKEN: ${{ secrets.OPENCLAW_LIVE_SETUP_TOKEN }}
      OPENCLAW_LIVE_SETUP_TOKEN_MODEL: ${{ secrets.OPENCLAW_LIVE_SETUP_TOKEN_MODEL }}
      OPENCLAW_LIVE_SETUP_TOKEN_PROFILE: ${{ secrets.OPENCLAW_LIVE_SETUP_TOKEN_PROFILE }}
      OPENCLAW_LIVE_SETUP_TOKEN_VALUE: ${{ secrets.OPENCLAW_LIVE_SETUP_TOKEN_VALUE }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      FAL_KEY: ${{ secrets.FAL_KEY }}
      RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
      DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      VYDRA_API_KEY: ${{ secrets.VYDRA_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      Z_AI_API_KEY: ${{ secrets.Z_AI_API_KEY }}
      BYTEPLUS_ACCESS_KEY_ID: ${{ secrets.BYTEPLUS_ACCESS_KEY_ID }}
      BYTEPLUS_SECRET_ACCESS_KEY: ${{ secrets.BYTEPLUS_SECRET_ACCESS_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      OPENCLAW_CODEX_AUTH_JSON: ${{ secrets.OPENCLAW_CODEX_AUTH_JSON }}
      OPENCLAW_CODEX_CONFIG_TOML: ${{ secrets.OPENCLAW_CODEX_CONFIG_TOML }}
      OPENCLAW_CLAUDE_JSON: ${{ secrets.OPENCLAW_CLAUDE_JSON }}
      OPENCLAW_CLAUDE_CREDENTIALS_JSON: ${{ secrets.OPENCLAW_CLAUDE_CREDENTIALS_JSON }}
      OPENCLAW_CLAUDE_SETTINGS_JSON: ${{ secrets.OPENCLAW_CLAUDE_SETTINGS_JSON }}
      OPENCLAW_CLAUDE_SETTINGS_LOCAL_JSON: ${{ secrets.OPENCLAW_CLAUDE_SETTINGS_LOCAL_JSON }}
      OPENCLAW_GEMINI_SETTINGS_JSON: ${{ secrets.OPENCLAW_GEMINI_SETTINGS_JSON }}
